<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloodTrace - Module SIH Banque de Sang</title>
    <meta name="description" content="Module SIH de gestion et tracabilite des dons de sang" />
    <script>
      /* Anti-flash: apply theme before render */
      (function () {
        const storageKey = 'bloodtrace-theme';
        const theme = localStorage.getItem(storageKey);
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
