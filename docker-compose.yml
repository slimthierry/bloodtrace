version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: bloodtrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bloodtrace
      POSTGRES_PASSWORD: bloodtrace_secret
      POSTGRES_DB: bloodtrace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloodtrace"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: bloodtrace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bloodtrace-backend
    restart: unless-stopped
    ports:
      - "9400:9400"
    environment:
      DATABASE_URL: postgresql+asyncpg://bloodtrace:bloodtrace_secret@postgres:5432/bloodtrace
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: bloodtrace-dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3700"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bloodtrace-web
    restart: unless-stopped
    ports:
      - "3700:3700"
    environment:
      VITE_API_URL: http://localhost:9400
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
